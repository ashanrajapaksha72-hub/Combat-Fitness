<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Order</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../CSS/edit_order.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        .flavor-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
        }

        .flavor-label {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border: 1px solid #ccc;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: border-color 0.2s, background 0.2s;
        }

        .flavor-label:has(.flavor-cb:checked) {
            border-color: #e74c3c;
            background: #e74c3c18;
            color: #e74c3c;
            font-weight: 600;
        }

        .flavor-cb {
            accent-color: #e74c3c;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="top-bar">

            <div class="breadcrumb">

                <a href="product_managment.html" class="back-btn">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>

                <div class="path">
                    <span>Product Management</span>
                    <span>/</span>
                    <strong id="breadcrumb-order-number">Add Product</strong>
                </div>

            </div>

        </div>

        <!-- Edit Form -->
        <div class="card">

            <div class="card-header">

                <div class="icon-box">
                    <i class="fa-solid fa-pen"></i>
                </div>

                <div>
                    <h2>Add Product</h2>
                    <p>Add new product to the database</p>
                </div>

            </div>

            <form id="edit-order-form">

                <div class="grid-3">

                    <div class="form-group">
                        <label>Product Name</label>
                        <input type="text" id="input-product">
                    </div>

                    <div class="form-group">
                        <label>Unit Price</label>
                        <input type="number" id="input-price" min="0">
                    </div>

                    <div class="form-group">
                        <label>Brand Name</label>
                        <input type="text" id="input-brand">
                    </div>

                    <div class="form-group">
                        <label>Number Of Units</label>
                        <input type="number" id="input-stock" min="0">
                    </div>

                </div>

                <!-- Flavors -->
                <div class="form-group">
                    <label>Flavours <span style="font-weight:400;font-size:13px;opacity:0.6">(tick all that apply —
                            leave blank if none)</span></label>
                    <div class="flavor-group" id="flavor-checkboxes">
                    
                    </div>
                </div>

                <!-- Images -->
                <div class="form-group">
                    <label>First Image Path</label>
                    <textarea id="input-firstimg" placeholder="../Images/product.png"></textarea>
                </div>

                <div class="form-group">
                    <label>Second Image Path</label>
                    <textarea id="input-secondimg" placeholder="../Images/product2.png"></textarea>
                </div>

                <div class="form-group">
                    <label>Third Image Path</label>
                    <textarea id="input-thirdimg" placeholder="../Images/product3.png"></textarea>
                </div>

                <div class="bottom-actions">

                    <button type="button" class="btn btn-outline large" id="cancel-btn-bottom">
                        <i class="fa-solid fa-xmark"></i>
                        Cancel
                    </button>

                    <button type="submit" class="btn btn-danger large" id="submit-btn">
                        <i class="fa-regular fa-floppy-disk"></i>
                        Add Product
                    </button>

                </div>

            </form>

        </div>

    </div>

    <script src="../JS/add_product.js"></script>

</body>

</html>
