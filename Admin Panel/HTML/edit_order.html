<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Order</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../CSS/edit_order.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <div class="container">

        <!-- Header -->
        <div class="top-bar">

            <div class="breadcrumb">

                <a href="ordermanagment.html" class="back-btn">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>

                <div class="path">
                    <span>Order Management</span>
                    <span>/</span>
                    <strong id="breadcrumb-order-number">Edit Order</strong>
                </div>

            </div>

            <div class="header-actions">

                <button type="button" class="btn btn-outline" id="cancel-btn-top">
                    <i class="fa-solid fa-xmark"></i>
                    Cancel
                </button>

                <button type="submit" form="edit-order-form" class="btn btn-danger">
                    <i class="fa-regular fa-floppy-disk"></i>
                    Save Changes
                </button>

            </div>

        </div>

        <!-- Order Summary -->
        <div class="card summary-card">

            <div class="summary-item">
                <label>Order ID</label>
                <h2 id="summary-order-id">#</h2>
                <p><i class="fa-solid fa-lock"></i> Cannot be edited</p>
            </div>

            <div class="summary-item">
                <label>Member ID</label>
                <h2 id="summary-member-id">-</h2>
                <p><i class="fa-solid fa-lock"></i> Cannot be edited</p>
            </div>

            <div class="summary-item">
                <label>Total Amount</label>
                <h2 id="summary-total">-</h2>
                <p><i class="fa-solid fa-lock"></i> Cannot be edited</p>
            </div>

            <div class="summary-item">
                <label>Order Date</label>
                <h2 id="summary-date">-</h2>
                <small id="summary-time"></small>
                <p><i class="fa-solid fa-lock"></i> Cannot be edited</p>
            </div>

            <div class="summary-item">
                <label>Payment Method</label>
                <h2 id="summary-payment">-</h2>
                <small id="summary-payment-sub"></small>
                <p><i class="fa-solid fa-lock"></i> Cannot be edited</p>
            </div>

        </div>

        <!-- Edit Form -->
        <div class="card">

            <div class="card-header">

                <div class="icon-box">
                    <i class="fa-solid fa-pen"></i>
                </div>

                <div>
                    <h2>Edit Order Details</h2>
                    <p>Update the editable information below</p>
                </div>

            </div>

            <form id="edit-order-form">

                <div class="grid-3">

                    <div class="form-group">
                        <label>Customer Name</label>
                        <input type="text" id="input-name">
                    </div>

                    <div class="form-group">
                        <label>Phone</label>
                        <input type="text" id="input-phone">
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="input-email">
                    </div>

                </div>

                <div class="form-group">
                    <label>Delivery Address</label>
                    <textarea id="input-address"></textarea>
                </div>

                <div class="grid-4">

                    <div class="form-group">
                        <label>City</label>
                        <input type="text" id="input-city">
                    </div>

                    <div class="form-group">
                        <label>Province</label>
                        <select id="input-province">
                            <option value="Western">Western</option>
                            <option value="Central">Central</option>
                            <option value="Southern">Southern</option>
                            <option value="Northern">Northern</option>
                            <option value="Eastern">Eastern</option>
                            <option value="North Western">North Western</option>
                            <option value="North Central">North Central</option>
                            <option value="Uva">Uva</option>
                            <option value="Sabaragamuwa">Sabaragamuwa</option>
                        </select>
                    </div>

                    

                    <div class="form-group">
                        <label>Order Status</label>
                        <select class="status" id="input-status">
                            <option value="pending">Pending</option>
                            <option value="confirmed">Confirmed</option>
                            <option value="ready">Ready</option>
                            <option value="completed">Completed</option>
                            <option value="cancelled">Cancelled</option>
                        </select>
                    </div>

                </div>

                <div class="bottom-actions">

                    <button type="button" class="btn btn-outline large" id="cancel-btn-bottom">
                        <i class="fa-solid fa-xmark"></i>
                        Cancel
                    </button>

                    <button type="submit" class="btn btn-danger large">
                        <i class="fa-regular fa-floppy-disk"></i>
                        Save Changes
                    </button>

                </div>

            </form>

        </div>

    </div>

    <script src="../JS/edit_order.js"></script>
</body>

</html>
