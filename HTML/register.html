<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="../CSS/register.css">
</head>
<body>

    <div class="form-container">
        <h1 class="main-title">COMBAT <span class="accent-red">FITNESS</span></h1>
        
        <h2 class="form-header">REGISTER</h2>
        
        <div class="input-group">
            <input id="email" type="email" class="input-field" placeholder="Email Address:">
            <input id="memberId" type="text" class="input-field" placeholder="Member ID:">
            <input id="phone" type="tel" class="input-field" placeholder="Phone Number:">
            <input id="password" type="password" class="input-field" placeholder="Password:">
            <input id="confirmPassword" type="password" class="input-field" placeholder="Confirm Password:">
        </div>

        <button class="action-btn" id="registerBtn">REGISTER</button>

        <p id="message"></p>

    </div>  <!-- Closed form-container -->


    <script src="../Javascript/register.js"></script>
</body>
</html>
